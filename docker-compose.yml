# =============================================================================
# CometLMS — Production Docker Compose
# Usage:  cp .env.example .env  →  fill in values  →  docker compose up -d --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ${STACK_PREFIX:-cometlms}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cometlms}
      POSTGRES_USER: ${POSTGRES_USER:-cometlms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cometlms_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cometlms} -d ${POSTGRES_DB:-cometlms}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${STACK_PREFIX:-cometlms}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # API — Express + Prisma + CometChat
  # Exposed on port 3000 for:
  #   • Mobile app direct access  (https://cometlms-a.cometchat-staging.com → :3000)
  #   • Internal Nginx proxy      (web container → http://api:3000)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ${STACK_PREFIX:-cometlms}-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-cometlms}:${POSTGRES_PASSWORD:-cometlms_secret}@postgres:5432/${POSTGRES_DB:-cometlms}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      # CORS: set to the public web domain so browser requests are accepted
      CLIENT_URL: ${CLIENT_URL:-https://lms.cometchat-staging.com}
      WEB_URL: ${WEB_URL:-https://lms.cometchat-staging.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://lms.cometchat-staging.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Firebase Admin SDK (push notifications)
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      # CometChat Server-Side (REST API)
      COMETCHAT_APP_ID: ${COMETCHAT_APP_ID}
      COMETCHAT_REGION: ${COMETCHAT_REGION}
      COMETCHAT_AUTH_KEY: ${COMETCHAT_AUTH_KEY}
      COMETCHAT_REST_API_KEY: ${COMETCHAT_REST_API_KEY}
      COMETCHAT_WEBHOOK_SECRET: ${COMETCHAT_WEBHOOK_SECRET:-}
    # Default "3000:3000" (CometLMS). For a parallel stack set API_PORT to a
    # non-conflicting host port, e.g. API_PORT=127.0.0.1:3001
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Web — React SPA served by Nginx
  # Nginx reverse-proxies /api/* → api:3000
  # Port mapping: change left side if 80 is taken on the host (e.g. "8080:80")
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Empty = same-origin; Nginx proxies /api → api:3000 inside Docker
        VITE_API_URL: ${VITE_API_URL:-}
        # CometChat client-side credentials (baked into the React bundle)
        VITE_COMETCHAT_APP_ID: ${COMETCHAT_APP_ID}
        VITE_COMETCHAT_REGION: ${COMETCHAT_REGION}
        VITE_COMETCHAT_AUTH_KEY: ${COMETCHAT_AUTH_KEY}
        # Firebase Web SDK
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY:-}
    container_name: ${STACK_PREFIX:-cometlms}-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    driver: bridge
