name: smartpds_mobile
description: SmartPDS LMS Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # CometChat UIKit v6 (bundled calls - includes cometchat_calls_sdk)
  cometchat_chat_uikit: 6.0.1

  # Secure Storage (JWT tokens)
  flutter_secure_storage: ^9.2.2

  # Video Player
  video_player: ^2.9.1
  chewie: ^1.8.1

  # Push Notifications (FCM)
  firebase_core: ^3.15.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.4

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Utilities
  intl: any
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  share_plus: ^12.0.0
  permission_handler: ^11.3.1

  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  youtube_player_iframe: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
